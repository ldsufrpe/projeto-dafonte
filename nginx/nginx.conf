limit_req_zone $binary_remote_addr zone=apilimit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Serve Vue SPA
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api to FastAPI
    location /api/ {
        limit_req zone=apilimit burst=20 nodelay;
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve evidence files statically (read-only volume)
    location /media/evidencias/ {
        alias /evidencias/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';" always;
}
